<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konoha WE — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
    header { background: #0f172a; color: #f8fafc; padding: 14px 28px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 12px; color: #64748b; }
    nav { display: flex; gap: 4px; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e2e8f0; }
    nav a { padding: 7px 16px; border-radius: 6px; text-decoration: none; color: #475569; font-size: 14px; }
    nav a:hover, nav a.active { background: #f1f5f9; color: #0f172a; font-weight: 500; }
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }
    .card h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-weight: 700; color: #0f172a; }
    .card .sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .links { display: flex; flex-direction: column; gap: 8px; }
    .links a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; text-decoration: none; color: #334155; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 14px; }
    .links a:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .links a .icon { font-size: 18px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>Konoha Workflow Engine</h1>
  <span>AI Factory — coMind</span>
</header>
<nav>
  <a href="/ui/index.html" class="active">Dashboard</a>
  <a href="/ui/processes.html">Processes</a>
  <a href="/ui/workitems.html">Work Items</a>
</nav>
<div class="container">
  <div class="grid" id="stats">
    <div class="card"><h3>Workflows</h3><div class="value" id="wf-count">—</div><div class="sub">registered</div></div>
    <div class="card"><h3>Active Cases</h3><div class="value" id="case-count">—</div><div class="sub">running</div></div>
    <div class="card"><h3>Work Items</h3><div class="value" id="wi-count">—</div><div class="sub">pending + assigned</div></div>
  </div>
  <div class="panel">
    <h2>Navigation</h2>
    <div class="links">
      <a href="/ui/processes.html"><span class="icon">🗂</span> Process Registry — browse eEPC workflows and active cases</a>
      <a href="/ui/workitems.html"><span class="icon">✅</span> Work Items — task queue with filters and actions</a>
    </div>
  </div>
</div>
<script>
  const TOKEN = new URLSearchParams(location.search).get('token') ||
                localStorage.getItem('konoha_token') ||
                prompt('Konoha API token:');
  if (TOKEN) localStorage.setItem('konoha_token', TOKEN);

  const api = (path) => fetch(path, { headers: { Authorization: 'Bearer ' + TOKEN } }).then(r => r.json());

  Promise.all([
    api('/workflows').catch(() => []),
    api('/workitems?status=pending').catch(() => []),
    api('/workitems?status=assigned').catch(() => []),
  ]).then(([wf, pending, assigned]) => {
    document.getElementById('wf-count').textContent = Array.isArray(wf) ? wf.length : '—';
    document.getElementById('case-count').textContent = '—';
    document.getElementById('wi-count').textContent =
      (Array.isArray(pending) ? pending.length : 0) + (Array.isArray(assigned) ? assigned.length : 0);
  });
</script>
</body>
</html>
